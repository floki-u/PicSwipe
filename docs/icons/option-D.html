<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PicS Icon - Option D: Pixel Retro Game Screen</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const P = 32;

const BG = '#12101F';
const TEAL = '#5DE6C8';
const DEEP_TEAL = '#3BAA92';
const AMBER = '#F0C674';
const TEAL_DIM = '#2D7A68';
const TEAL_BRIGHT = '#8CFCE0';
const BODY_DARK = '#1A1730';
const BODY_MID = '#252240';
const BODY_LIGHT = '#302D50';
const SCREEN_BG = '#0A0914';
const SCREEN_GLOW = '#0D1A1F';

function px(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * P, y * P, P, P);
}

function rect(x, y, w, h, color) {
  for (let i = x; i < x + w; i++)
    for (let j = y; j < y + h; j++)
      px(i, j, color);
}

// Fill background
ctx.fillStyle = BG;
ctx.fillRect(0, 0, 1024, 1024);

// Screen glow effect
const grad = ctx.createRadialGradient(512, 350, 50, 512, 400, 400);
grad.addColorStop(0, 'rgba(93, 230, 200, 0.1)');
grad.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 1024, 1024);

// === DEVICE BODY ===
// Main body (rounded rectangle shape)
rect(6, 2, 20, 28, BODY_MID);
// Rounded corners - cut
px(6, 2, BG); px(7, 2, BG); px(6, 3, BG);
px(25, 2, BG); px(24, 2, BG); px(25, 3, BG);  // Adjust: 6+20-1=25
px(6, 29, BG); px(7, 29, BG); px(6, 28, BG);
px(25, 29, BG); px(24, 29, BG); px(25, 28, BG);
// Top highlight edge
rect(8, 2, 16, 1, BODY_LIGHT);
// Side shading
for (let y = 3; y < 29; y++) { px(6, y, BODY_DARK); px(25, y, BODY_DARK); }
// Bottom edge
rect(8, 29, 16, 1, BODY_DARK);

// === SCREEN BEZEL ===
rect(8, 4, 16, 14, '#0D0B1A');

// === SCREEN ===
rect(9, 5, 14, 12, SCREEN_BG);

// Screen inner glow
const sGrad = ctx.createRadialGradient(512, 352, 20, 512, 352, 200);
sGrad.addColorStop(0, 'rgba(93, 230, 200, 0.06)');
sGrad.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = sGrad;
ctx.fillRect(9*P, 5*P, 14*P, 12*P);

// === ON-SCREEN CONTENT: Swipe arrow + "S" ===
// Upward arrow (swipe up = keep)
const arrow = [
  [16, 7, TEAL_BRIGHT],  // tip
  [15, 8, TEAL], [16, 8, TEAL], [17, 8, TEAL],
  [14, 9, TEAL], [15, 9, TEAL], [16, 9, TEAL], [17, 9, TEAL], [18, 9, TEAL],
  [16, 10, TEAL_DIM], [16, 11, TEAL_DIM], [16, 12, TEAL_DIM],
];
arrow.forEach(([x, y, col]) => px(x, y, col));

// Small photo icon on screen (left side)
rect(10, 11, 3, 3, TEAL_DIM);
rect(11, 12, 1, 1, TEAL);

// Small trash/X icon on screen (right side - for "delete" swipe left)
px(20, 11, '#C0392B80'); px(22, 11, '#C0392B80');
px(21, 12, '#C0392B80');
px(20, 13, '#C0392B80'); px(22, 13, '#C0392B80');

// Left arrow hint (swipe left = delete)
px(10, 9, '#C0392B60'); px(11, 8, '#C0392B40');
px(11, 10, '#C0392B40');

// Scanline effect on screen
for (let y = 5; y <= 16; y += 2) {
  for (let x = 9; x <= 22; x++) {
    ctx.fillStyle = 'rgba(255,255,255,0.01)';
    ctx.fillRect(x * P, y * P, P, P);
  }
}

// === D-PAD (bottom left) ===
px(10, 21, BODY_LIGHT);
px(9, 22, BODY_LIGHT); px(10, 22, BODY_LIGHT); px(11, 22, BODY_LIGHT);
px(10, 23, BODY_LIGHT);
// D-pad center
px(10, 22, '#3A3760');

// === BUTTONS (bottom right) ===
px(20, 21, TEAL_DIM); px(22, 21, AMBER);
px(20, 23, DEEP_TEAL); px(22, 23, '#C0392B80');
// Button highlights
px(20, 21, TEAL); px(22, 21, AMBER);

// === SPEAKER GRILLE (very bottom) ===
px(13, 27, BODY_DARK); px(15, 27, BODY_DARK); px(17, 27, BODY_DARK); px(19, 27, BODY_DARK);

// === TOP DETAILS ===
// Power LED
px(8, 3, TEAL);
// Brand area on top bezel
px(14, 3, BODY_LIGHT); px(15, 3, BODY_LIGHT); px(16, 3, BODY_LIGHT); px(17, 3, BODY_LIGHT);

// === "PicS" TEXT ON SCREEN (pixel font, centered) ===
// Let's put PicS as the "game title" in the screen
const textY = 5;
const textStartX = 11;

// Tiny 3x5 pixel font for screen text
// P (3x5)
const letters = {
  'P': [[0,0],[1,0],[0,1],[2,1],[0,2],[1,2],[0,3],[0,4]],
  'i': [[0,0],[0,2],[0,3],[0,4]],
  'c': [[1,0],[0,1],[0,2],[0,3],[1,4]],
  'S': [[1,0],[0,1],[1,2],[2,3],[1,4]],
};

let offX = 12;
for (const ch of 'PicS') {
  const color = ch === 'S' ? AMBER : TEAL_BRIGHT;
  const letter = letters[ch];
  if (letter) {
    letter.forEach(([lx, ly]) => px(offX + lx, textY + ly, color));
    const maxX = Math.max(...letter.map(p => p[0]));
    offX += maxX + 2;
  }
}

// === AMBIENT SPARKLES ===
px(4, 6, TEAL + '40');
px(27, 8, TEAL + '40');
px(3, 15, AMBER + '30');
px(28, 14, AMBER + '30');
px(5, 25, TEAL + '20');
px(27, 22, TEAL + '20');

// === "PicS" TEXT BELOW DEVICE ===
// Removed - text is on screen. Add subtle glow under device instead.
// Device shadow
rect(8, 30, 16, 1, '#0A091480');

</script>
<br><button onclick="savePNG()" style="padding:12px 24px;font-size:16px;background:#5DE6C8;color:#12101F;border:none;border-radius:8px;cursor:pointer;font-weight:bold;">💾 Save as PNG</button><script>function savePNG(){var c=document.querySelector("canvas");var a=document.createElement("a");a.download="option-D.png";a.href=c.toDataURL("image/png");a.click();}</script></body>
</html>
