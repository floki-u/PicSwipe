name: PicSwipe
options:
  bundleIdPrefix: com.picswipe
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.1"
  swift: "5.9"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    ENABLE_PREVIEWS: YES

targets:
  PicSwipe:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PicSwipe
        excludes:
          - "**/.gitkeep"
    info:
      path: PicSwipe/Info.plist
      properties:
        CFBundleDisplayName: PicSwipe
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPhotoLibraryUsageDescription: "PicSwipe 需要访问你的照片库来展示和清理照片。你的照片不会被上传或分享。"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: YES
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.picswipe.app
        PRODUCT_NAME: PicSwipe
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: PicSwipe/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
    entitlements:
      path: PicSwipe/PicSwipe.entitlements

  PicSwipeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PicSwipeTests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: PicSwipe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.picswipe.app.tests
        SWIFT_VERSION: "5.9"

  PicSwipeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PicSwipeUITests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: PicSwipe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.picswipe.app.uitests
        SWIFT_VERSION: "5.9"

schemes:
  PicSwipe:
    build:
      targets:
        PicSwipe: all
        PicSwipeTests: [test]
        PicSwipeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PicSwipeTests
        - PicSwipeUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
